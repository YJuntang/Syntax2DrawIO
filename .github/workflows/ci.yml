name: quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --run
      - run: npm run build
      - name: Verify PWA assets and precache budget
        run: |
          test -f dist/favicon.svg
          test -f dist/masked-icon.svg
          node -e "const fs=require('fs');const sw=fs.readFileSync('dist/sw.js','utf8');if(sw.length>500000)throw new Error('Service worker/precache manifest is unexpectedly large')"

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: cargo check --manifest-path src-tauri/Cargo.toml
